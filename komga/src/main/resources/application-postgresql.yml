# PostgreSQL profile configuration
spring:
  profiles:
    active: postgresql
  flyway:
    locations:
      - classpath:db/migration/postgresql
      - classpath:tasks/migration/postgresql
    placeholders:
      sqlite-only: ""
      postgresql-only: ""
    placeholder-replacement: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false

komga:
  database:
    # PostgreSQL connection will be configured via environment variables:
    # DATABASE_URL, DATABASE_USER, DATABASE_PASSWORD
    file: "postgresql://localhost:5432/komga"
    journal-mode: WAL
    pool-size: 10
    max-pool-size: 20
  tasks-db:
    # PostgreSQL tasks database connection
    file: "postgresql://localhost:5432/komga_tasks"
    journal-mode: WAL
    pool-size: 5
    max-pool-size: 10

logging:
  level:
    org.jooq: INFO
    org.flywaydb: INFO
    org.postgresql: INFO
    org.gotson.komga: DEBUG